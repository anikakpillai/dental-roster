# ============================================================
# UNITY DENTAL — RULES
# ============================================================

# Each dentist's preferred assistants, in order (used when no fixed assistant).
dentist_preferences:
  D_PILLAI: [A_RISHABH, A_RAJAT]
  D_MARIO:  [A_KALPANA, A_RAJAT, A_LIKHITHA, A_PARI, A_RISHABH]
  D_LALEH:  [A_LIKHITHA, A_PARI, A_RISHABH]

# Assistants ALWAYS paired with a dentist (overrides preferences).
fixed_assistants:
  D_PILLAI: [A_RISHABH, A_RAJAT]    # Dr Pillai always has both

# Default number of assistants per dentist.
assistant_count_by_dentist:
  D_PILLAI: 2
  D_MARIO:  1     # becomes 2 for surgery/implant automatically (see below);
                  # large-value / >8h / simultaneous-booking days → bump manually
  D_LALEH:  1

# Procedures that need a 2nd assistant, applied from Open Dental procedure type.
assistant_requirements:
  Surgery:
    count: 2
    extra_needs_skill: false        # 2nd assistant just preps
  Implant:
    count: 2
    extra_needs_skill: true         # 2nd assistant also chairside (needs implant skill)

# Which skill an assistant needs to assist each procedure type.
procedure_skill_map:
  Implant: [implant]
  Surgery: [surgery]
  Endodontics: [endo]
  Orthodontics: [ortho]
  Hygiene/Recall: [hygiene]

skill_catalogue: [general, implant, surgery, endo, ortho, restorative, hygiene]

allow_overtime: true
