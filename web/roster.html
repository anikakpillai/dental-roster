<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unity Roster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f8f9fa; --surface:#fff; --ink:#202124; --ink-soft:#5f6368; --ink-faint:#80868b;
    --line:#dadce0; --line-soft:#e8eaed;
    --accent:#0b7a6e; --accent-hover:#0a6c61; --accent-weak:#e6f4f1; --accent-ink:#08534b;
    --info:#1a73e8; --info-bg:#e8f0fe;
    --warn:#b06000; --warn-bg:#fef7e0;
    --crit:#c5221f; --crit-bg:#fce8e6;
    --ok:#188038; --ok-bg:#e6f4ea;
    --r-dentist:#0b7a6e; --r-assistant:#3b5bdb; --r-front:#b06000; --r-coord:#7048e8; --r-steril:#0f8a8a; --r-hyg:#c2410c;
    --radius:12px; --shadow:0 1px 2px rgba(60,64,67,.08),0 1px 6px rgba(60,64,67,.06);
    --shadow-lift:0 1px 3px rgba(60,64,67,.12),0 4px 12px rgba(60,64,67,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.5;
    color:var(--ink);background:var(--bg)}

  .appbar{position:sticky;top:0;z-index:20;background:var(--surface);border-bottom:1px solid var(--line);
    height:64px;display:flex;align-items:center}
  .appbar .inner{width:100%;max-width:1280px;margin:0 auto;padding:0 28px;
    display:flex;align-items:center;justify-content:space-between;gap:20px}
  .mark{display:flex;align-items:center;gap:12px}
  .mark .glyph{width:34px;height:34px;border-radius:9px;background:var(--accent);color:#fff;
    display:grid;place-items:center;font-weight:700;font-size:18px;letter-spacing:-.02em}
  .mark .title{font-size:18px;font-weight:600;letter-spacing:-.01em}
  .mark .title span{color:var(--ink-faint);font-weight:500}
  .clinic{font-size:13px;color:var(--ink-soft);text-align:right;line-height:1.35}
  .clinic strong{display:block;color:var(--ink);font-weight:600}

  .page{max-width:1280px;margin:0 auto;padding:28px}

  .controls{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:22px 24px;margin-bottom:24px}
  .controls-grid{display:grid;grid-template-columns:200px 1fr auto;gap:20px;align-items:end}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);
    margin-bottom:7px;letter-spacing:.01em}
  .field .hint{font-weight:400;color:var(--ink-faint)}
  input[type=date],input[type=text],input[type=time],textarea{width:100%;font-family:inherit;font-size:14px;color:var(--ink);
    background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:11px 13px;transition:border-color .12s,box-shadow .12s}
  textarea{resize:vertical;min-height:46px;max-height:120px;line-height:1.45}
  input:hover,textarea:hover{border-color:var(--ink-faint)}
  input:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-weak)}
  .btn{font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;border:none;border-radius:9px;
    padding:12px 22px;background:var(--accent);color:#fff;transition:background .12s,box-shadow .12s;
    display:inline-flex;align-items:center;gap:9px;white-space:nowrap}
  .btn:hover{background:var(--accent-hover);box-shadow:var(--shadow)}
  .btn:active{transform:translateY(.5px)}
  .btn:disabled{opacity:.6;cursor:default;box-shadow:none}
  .btn.ghost{background:var(--surface);color:var(--accent);border:1px solid var(--line)}
  .btn.ghost:hover{background:var(--accent-weak);border-color:var(--accent)}
  .btn.sm{padding:9px 16px;font-size:13px}
  .btn.danger{background:var(--surface);color:var(--crit);border:1px solid var(--line)}
  .btn.danger:hover{background:var(--crit-bg);border-color:var(--crit)}
  .spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;
    border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .summary{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px;
    font-size:13px;color:var(--ink-soft)}
  .summary .wk{font-size:16px;font-weight:600;color:var(--ink)}
  .summary .dot{width:3px;height:3px;border-radius:50%;background:var(--line);flex:0 0 auto}
  .summary .actions{margin-left:auto;display:flex;gap:8px}

  .warns{display:flex;flex-direction:column;gap:8px;margin-bottom:22px}
  .warn-row{display:flex;align-items:flex-start;gap:11px;padding:11px 14px;border-radius:9px;
    font-size:13px;line-height:1.45;border:1px solid transparent}
  .warn-row .ic{flex:0 0 auto;width:18px;height:18px;border-radius:50%;display:grid;place-items:center;
    font-size:12px;font-weight:700;color:#fff;margin-top:1px}
  .warn-row.info{background:var(--info-bg);border-color:#d2e3fc;color:#174ea6}
  .warn-row.info .ic{background:var(--info)}
  .warn-row.warning{background:var(--warn-bg);border-color:#feefc3;color:#8a5300}
  .warn-row.warning .ic{background:var(--warn)}
  .warn-row.critical{background:var(--crit-bg);border-color:#fad2cf;color:#a50e0e}
  .warn-row.critical .ic{background:var(--crit)}
  .warn-row code{font-family:'Roboto Mono',monospace;font-size:12px;background:rgba(0,0,0,.05);
    padding:1px 5px;border-radius:4px}

  .matrix-wrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden}
  table{width:100%;border-collapse:collapse;table-layout:fixed}
  th,td{text-align:left;border-bottom:1px solid var(--line-soft)}
  thead th{background:var(--surface);padding:14px 12px;font-size:12px;font-weight:600;color:var(--ink-soft);
    border-bottom:1px solid var(--line)}
  thead th.daycol{text-align:center}
  thead th.daycol .dow{display:block;font-size:13px;font-weight:700;color:var(--ink)}
  thead th.daycol .dnum{display:block;font-size:11px;color:var(--ink-faint);font-weight:500;margin-top:1px}
  th.namecol{width:170px;padding-left:20px}
  .grouprow td{background:var(--bg);padding:8px 20px;font-size:11px;font-weight:700;
    letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);border-bottom:1px solid var(--line-soft)}
  tbody .namecol{padding:11px 12px 11px 20px;font-weight:500;font-size:13.5px;color:var(--ink);
    border-left:3px solid transparent}
  tr[data-role=dentist] .namecol{border-left-color:var(--r-dentist)}
  tr[data-role=assistant] .namecol{border-left-color:var(--r-assistant)}
  tr[data-role=front_desk] .namecol{border-left-color:var(--r-front)}
  tr[data-role=coordinator] .namecol{border-left-color:var(--r-coord)}
  tr[data-role=sterilization] .namecol{border-left-color:var(--r-steril)}
  tr[data-role=hygienist] .namecol{border-left-color:var(--r-hyg)}
  tbody td.cell{padding:8px 6px;text-align:center;vertical-align:middle;cursor:pointer;position:relative;transition:background .1s}
  tbody td.cell:hover{background:var(--accent-weak)}
  tbody td.cell:hover .off{color:var(--accent)}
  .chip{display:inline-block;font-family:'Roboto Mono',monospace;font-size:11.5px;font-weight:500;
    color:var(--accent-ink);background:var(--accent-weak);border-radius:6px;padding:4px 8px;white-space:nowrap;line-height:1.3;pointer-events:none}
  .chip .sub{display:block;font-family:'Inter';font-size:10px;color:var(--ink-faint);font-weight:500;margin-top:1px}
  .off{color:var(--line);font-size:13px;pointer-events:none}
  .edit-hint{display:none}
  tbody td.cell:hover .edit-hint{display:inline-block;position:absolute;top:3px;right:5px;font-size:10px;color:var(--accent);font-weight:600;pointer-events:none}

  .empty{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:64px 32px;text-align:center}
  .empty .e-glyph{width:52px;height:52px;border-radius:14px;background:var(--accent-weak);
    color:var(--accent);display:grid;place-items:center;margin:0 auto 18px;font-size:24px}
  .empty h3{font-size:17px;font-weight:600;margin-bottom:6px}
  .empty p{font-size:13.5px;color:var(--ink-soft);max-width:380px;margin:0 auto}
  .hidden{display:none}
  .fade{animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  .overlay{position:fixed;inset:0;background:rgba(32,33,36,.45);z-index:40;display:flex;
    align-items:center;justify-content:center;padding:20px;animation:fade .15s ease}
  .modal{background:var(--surface);border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,.25);
    width:100%;max-width:380px;padding:24px;animation:pop .16s ease}
  @keyframes pop{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:none}}
  .modal h3{font-size:16px;font-weight:600;margin-bottom:2px}
  .modal .who{font-size:13px;color:var(--ink-soft);margin-bottom:18px}
  .modal .two{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
  .modal .one{margin-bottom:14px}
  .modal-foot{display:flex;align-items:center;gap:10px;margin-top:20px}
  .modal-foot .spacer{flex:1}

  @media (max-width:860px){
    .controls-grid{grid-template-columns:1fr}
    .matrix-wrap{overflow-x:auto}
    table{min-width:760px}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  @media print{
    .appbar,.controls,.summary .actions,.edit-hint{display:none}
    .page{padding:0}
    .matrix-wrap{box-shadow:none;border:none}
    td.cell{cursor:default}
  }
</style>
</head>
<body>
  <div class="appbar">
    <div class="inner">
      <div class="mark">
        <div class="glyph">U</div>
        <div class="title">Unity Roster <span>· Staff scheduling</span></div>
      </div>
      <div class="clinic">
        <strong>Unity Dental &amp; Implant Centre</strong>
        Weekly roster, built from appointments
      </div>
    </div>
  </div>

  <div class="page">
    <div class="controls">
      <div class="controls-grid">
        <div class="field">
          <label for="wk">Week starting</label>
          <input type="date" id="wk">
        </div>
        <div class="field">
          <label for="notes">Notes for this week <span class="hint">— optional, the scheduler will factor these in</span></label>
          <textarea id="notes" placeholder="e.g. Busy Thursday expected — keep Pari mornings only"></textarea>
        </div>
        <div class="field">
          <button class="btn" id="go" onclick="generate()">
            <span id="go-label">Build roster</span>
          </button>
        </div>
      </div>
    </div>

    <div id="result"></div>

    <div id="empty" class="empty">
      <div class="e-glyph">▦</div>
      <h3>No roster yet</h3>
      <p>Pick a week and select <strong>Build roster</strong>. The scheduler reads that week's appointments and assigns staff around them. You can fine-tune any shift afterwards.</p>
    </div>
  </div>

<script>
  const API = 'http://127.0.0.1:8000';
  const DOW = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const ROLE_ORDER = [['dentist','Dentists'],['hygienist','Hygienists'],['assistant','Assistants'],['sterilization','Sterilization'],['front_desk','Front desk'],['coordinator','Coordinator']];
  let STATE = null;
  let EDIT = null;

  function mondayOf(d){const x=new Date(d);const off=(x.getDay()+6)%7;x.setDate(x.getDate()-off);return x;}
  function iso(d){return d.toISOString().slice(0,10);}
  function fmtTime(t){if(!t)return'';let[h,m]=t.split(':').map(Number);const ap=h>=12?'p':'a';let hh=h%12;if(hh===0)hh=12;return m===0?`${hh}${ap}`:`${hh}:${String(m).padStart(2,'0')}${ap}`;}
  function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

  document.getElementById('wk').value = iso(mondayOf(new Date()));

  async function generate(){
    const wkStart = document.getElementById('wk').value;
    if(!wkStart){return;}
    let start = new Date(wkStart+'T00:00:00');
    start = mondayOf(start);                       // snap to Monday of that week
    document.getElementById('wk').value = iso(start);
    const end = new Date(start); end.setDate(start.getDate()+5);
    const notes = document.getElementById('notes').value.trim();

    const btn=document.getElementById('go'), label=document.getElementById('go-label');
    btn.disabled=true; label.innerHTML='<span class="spinner"></span>';
    document.getElementById('empty').classList.add('hidden');
    try{
      const r = await fetch(`${API}/api/ai-roster?week_start=${iso(start)}&week_end=${iso(end)}`,{
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({manager_notes:notes})
      });
      if(!r.ok){throw new Error((await r.json()).detail || `Request failed (${r.status})`);}
      const data = await r.json();
      buildState(data, start, end);
      render();
    }catch(err){
      document.getElementById('result').innerHTML =
        `<div class="warns"><div class="warn-row critical"><span class="ic">!</span>
         <div>Couldn't build the roster. ${esc(err.message)}<br>
         <span style="color:var(--ink-faint)">Check the server is running and the week has appointments.</span></div></div></div>`;
    }finally{
      btn.disabled=false; label.textContent='Build roster';
    }
  }

  function buildState(data, start, end){
    const days = (data.roster||[]).slice().sort((a,b)=>a.date.localeCompare(b.date))
                  .map(d=>({date:d.date, weekday:d.weekday}));
    const byStaff = new Map();
    (data.roster||[]).forEach(d=>{
      (d.staff||[]).forEach(p=>{
        if(!byStaff.has(p.staff_id)) byStaff.set(p.staff_id,{name:p.name,role:p.role||'assistant',by:{}});
        byStaff.get(p.staff_id).by[d.date]={start:p.start,end:p.end,serves:p.serves||'',note:p.note||''};
      });
    });
    STATE = {days, byStaff, start, end, summary:data.summary||'', warnings:data.warnings||[]};
  }

  function render(){
    if(!STATE){return;}
    const {days, byStaff, start, end} = STATE;
    const range = `${start.toLocaleDateString('en-CA',{month:'short',day:'numeric'})} – ${end.toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'})}`;
    let html = `<div class="summary fade"><span class="wk">Week of ${range}</span>
        <span class="dot"></span><span>${byStaff.size} staff scheduled</span>`;
    if(STATE.summary){html+=`<span class="dot"></span><span>${esc(STATE.summary).slice(0,140)}${STATE.summary.length>140?'…':''}</span>`;}
    html+=`<span class="actions"><button class="btn ghost sm" onclick="window.print()">Print</button></span></div>`;

    if(STATE.warnings.length){
      html+=`<div class="warns fade">`;
      const ico={info:'i',warning:'!',critical:'!'};
      STATE.warnings.forEach(w=>{
        const sev=(w.severity||'info').toLowerCase();
        html+=`<div class="warn-row ${sev}"><span class="ic">${ico[sev]||'i'}</span><div>${formatWarn(w.message)}</div></div>`;
      });
      html+=`</div>`;
    }

    html+=`<div class="matrix-wrap fade"><table><thead><tr><th class="namecol">Staff</th>`;
    days.forEach(d=>{
      const dt=new Date(d.date+'T00:00:00');
      html+=`<th class="daycol"><span class="dow">${DOW[(dt.getDay()+6)%7]}</span><span class="dnum">${dt.toLocaleDateString('en-CA',{month:'short',day:'numeric'})}</span></th>`;
    });
    html+=`</tr></thead><tbody>`;

    ROLE_ORDER.forEach(([role,label])=>{
      const rows=[...byStaff.entries()].filter(([id,s])=>s.role===role)
        .sort((a,b)=>a[1].name.localeCompare(b[1].name));
      if(!rows.length) return;
      html+=`<tr class="grouprow"><td colspan="${days.length+1}">${label}</td></tr>`;
      rows.forEach(([id,s])=>{
        html+=`<tr data-role="${role}"><td class="namecol">${esc(s.name)}</td>`;
        days.forEach(d=>{
          const p=s.by[d.date];
          if(p && p.start && p.end){
            const sub = p.serves ? esc(p.serves) : (p.note?esc(p.note):'');
            html+=`<td class="cell" onclick="editCell('${id}','${d.date}')"><span class="chip">${fmtTime(p.start)}–${fmtTime(p.end)}${sub?`<span class="sub">${sub}</span>`:''}</span><span class="edit-hint">edit</span></td>`;
          }else{
            html+=`<td class="cell" onclick="editCell('${id}','${d.date}')"><span class="off">·</span><span class="edit-hint">add</span></td>`;
          }
        });
        html+=`</tr>`;
      });
    });
    html+=`</tbody></table></div>`;
    document.getElementById('result').innerHTML=html;
  }

  function formatWarn(msg){
    msg = esc(msg);
    msg = msg.replace(/^\[([A-Z_]+)\]\s*/,'<code>$1</code> ');
    return msg;
  }

  function editCell(staffId, date){
    const s = STATE.byStaff.get(staffId);
    if(!s) return;
    const p = s.by[date] || {start:'',end:'',serves:'',note:''};
    EDIT = {staffId, date};
    const dt = new Date(date+'T00:00:00');
    const dayLabel = dt.toLocaleDateString('en-CA',{weekday:'long',month:'short',day:'numeric'});
    const isAssistant = s.role==='assistant';
    const ov = document.createElement('div');
    ov.className='overlay'; ov.id='overlay';
    ov.onclick=(e)=>{if(e.target===ov)closeEdit();};
    ov.innerHTML = `<div class="modal">
        <h3>${esc(s.name)}</h3>
        <div class="who">${dayLabel}</div>
        <div class="two">
          <div><label for="e-start">Start</label><input type="time" id="e-start" value="${p.start||''}"></div>
          <div><label for="e-end">End</label><input type="time" id="e-end" value="${p.end||''}"></div>
        </div>
        ${isAssistant?`<div class="one"><label for="e-serves">Serves</label><input type="text" id="e-serves" value="${esc(p.serves)}" placeholder="e.g. Dr Pillai"></div>`:''}
        <div class="one"><label for="e-note">Note</label><input type="text" id="e-note" value="${esc(p.note)}" placeholder="optional"></div>
        <div class="modal-foot">
          <button class="btn danger sm" onclick="clearEdit()">Remove shift</button>
          <span class="spacer"></span>
          <button class="btn ghost sm" onclick="closeEdit()">Cancel</button>
          <button class="btn sm" onclick="saveEdit()">Save</button>
        </div>
      </div>`;
    document.body.appendChild(ov);
    setTimeout(()=>{const el=document.getElementById('e-start');if(el)el.focus();},50);
  }

  function saveEdit(){
    if(!EDIT) return;
    const start=document.getElementById('e-start').value;
    const end=document.getElementById('e-end').value;
    const servesEl=document.getElementById('e-serves');
    const noteEl=document.getElementById('e-note');
    const s=STATE.byStaff.get(EDIT.staffId);
    if(!start || !end){
      delete s.by[EDIT.date];
    }else{
      s.by[EDIT.date]={start,end,serves:servesEl?servesEl.value.trim():'',note:noteEl?noteEl.value.trim():''};
    }
    closeEdit(); render();
  }

  function clearEdit(){
    if(!EDIT) return;
    const s=STATE.byStaff.get(EDIT.staffId);
    delete s.by[EDIT.date];
    closeEdit(); render();
  }

  function closeEdit(){
    const ov=document.getElementById('overlay');
    if(ov) ov.remove();
    EDIT=null;
  }
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeEdit();});
</script>
</body>
</html>
